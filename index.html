<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print Assistant</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", ui-sans-serif, system-ui, sans-serif;
        background: #f6f7f4;
        color: #20231f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          radial-gradient(circle at top left, rgba(215, 233, 205, 0.75), transparent 34%),
          linear-gradient(145deg, #f8f8f4 0%, #eef2ea 100%);
      }

      main {
        width: min(100%, 420px);
      }

      .app {
        border: 1px solid rgba(42, 51, 38, 0.08);
        border-radius: 18px;
        padding: 30px;
        background: rgba(255, 255, 252, 0.94);
        box-shadow: 0 24px 70px rgba(36, 43, 34, 0.13);
      }

      .header {
        display: grid;
        gap: 18px;
        justify-items: center;
        margin-bottom: 30px;
        text-align: center;
      }

      .logo {
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: #1f2a1e;
        color: #fff;
        font-size: 26px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 25px;
        font-weight: 750;
        letter-spacing: 0;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        border-radius: 999px;
        padding: 9px 14px;
        background: #edf7ea;
        color: #1f6d32;
        font-size: 14px;
        font-weight: 700;
      }

      .status[data-state="offline"] {
        background: #fff0ed;
        color: #b22b1f;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: currentColor;
        box-shadow: 0 0 0 4px rgba(31, 109, 50, 0.12);
      }

      .status[data-state="offline"] .status-dot {
        box-shadow: 0 0 0 4px rgba(178, 43, 31, 0.12);
      }

      .ready-text {
        margin: 10px 0 0;
        color: #6a7166;
        font-size: 15px;
      }

      .form {
        display: grid;
        gap: 22px;
      }

      .field {
        display: grid;
        gap: 9px;
      }

      label {
        color: #3c4239;
        font-size: 14px;
        font-weight: 700;
      }

      select {
        width: 100%;
        min-height: 48px;
        border: 1px solid #d9ded3;
        border-radius: 12px;
        padding: 0 14px;
        background: #fff;
        color: #20231f;
        font: inherit;
        outline: none;
      }

      select:focus {
        border-color: #6b8f5d;
        box-shadow: 0 0 0 4px rgba(107, 143, 93, 0.14);
      }

      .paper-options {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .paper-option {
        position: relative;
      }

      .paper-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .paper-option span {
        min-height: 44px;
        display: grid;
        place-items: center;
        border: 1px solid #d9ded3;
        border-radius: 12px;
        background: #fff;
        color: #3d4339;
        cursor: pointer;
        font-size: 14px;
        font-weight: 750;
      }

      .paper-option input:checked + span {
        border-color: #243122;
        background: #243122;
        color: #fff;
      }

      button {
        min-height: 48px;
        border: 0;
        border-radius: 12px;
        padding: 0 16px;
        background: #243122;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 750;
      }

      button:hover {
        background: #1b2419;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.62;
      }

      .secondary {
        border: 1px solid #d9ded3;
        background: #fff;
        color: #384035;
      }

      .secondary:hover {
        background: #f5f7f1;
      }

      .update-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-top: 6px;
      }

      .update-row button {
        width: auto;
        min-height: 38px;
        padding: 0 12px;
        border-radius: 10px;
        font-size: 13px;
      }

      .quiet-result {
        display: grid;
        gap: 4px;
        border-radius: 12px;
        padding: 12px;
        background: #f5f7f1;
        color: #5d6658;
        font-size: 13px;
        line-height: 1.35;
      }

      .quiet-result strong {
        color: #30372d;
        font-size: 13px;
      }

      .message {
        min-height: 20px;
        margin: 0;
        color: #697066;
        font-size: 14px;
        line-height: 1.45;
        text-align: center;
      }

      .message[data-state="success"] {
        color: #1f6d32;
      }

      .message[data-state="error"] {
        color: #b22b1f;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="app" aria-labelledby="appTitle">
        <div class="header">
          <div class="logo" aria-hidden="true">P</div>
          <div>
            <h1 id="appTitle">Print Assistant</h1>
            <p class="ready-text" id="readyText">Pronto para imprimir</p>
          </div>
          <div class="status" id="assistantStatus" data-state="offline">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="assistantStatusText">Offline</span>
          </div>
        </div>

        <div class="form">
          <div class="field">
            <label for="printerSelect">Impressora padrao</label>
            <select id="printerSelect">
              <option value="">Procurando impressoras...</option>
            </select>
            <button class="secondary" id="refreshPrintersButton" type="button">Atualizar impressoras</button>
          </div>

          <div class="field">
            <label>Tamanho do papel</label>
            <div class="paper-options" role="radiogroup" aria-label="Tamanho do papel">
              <label class="paper-option">
                <input type="radio" name="paperSize" value="58mm" />
                <span>58mm</span>
              </label>
              <label class="paper-option">
                <input type="radio" name="paperSize" value="80mm" checked />
                <span>80mm</span>
              </label>
              <label class="paper-option">
                <input type="radio" name="paperSize" value="A4" />
                <span>A4</span>
              </label>
            </div>
          </div>

          <button id="testPrintButton" type="button">Imprimir teste</button>

          <div class="quiet-result" id="lastResult">
            <strong>Ultima impressao</strong>
            <span id="lastResultText">Nenhum teste executado.</span>
          </div>

          <div class="update-row">
            <button class="secondary" id="diagnosticButton" type="button">Diagnostico rapido</button>
            <button class="secondary" id="checkUpdateButton" type="button">Verificar atualizacao</button>
            <button id="installUpdateButton" class="hidden" type="button">Atualizar agora</button>
          </div>

          <p class="message" id="message" role="status" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script type="module">
      const DEFAULT_PAPER_SIZE = "80mm";

      const assistantStatus = document.getElementById("assistantStatus");
      const assistantStatusText = document.getElementById("assistantStatusText");
      const readyText = document.getElementById("readyText");
      const printerSelect = document.getElementById("printerSelect");
      const refreshPrintersButton = document.getElementById("refreshPrintersButton");
      const testPrintButton = document.getElementById("testPrintButton");
      const diagnosticButton = document.getElementById("diagnosticButton");
      const checkUpdateButton = document.getElementById("checkUpdateButton");
      const installUpdateButton = document.getElementById("installUpdateButton");
      const lastResultText = document.getElementById("lastResultText");
      const message = document.getElementById("message");

      const state = {
        printers: [],
        settings: {
          preferredPrinter: "",
          paperSize: DEFAULT_PAPER_SIZE,
        },
      };

      function setOnline(isOnline) {
        assistantStatus.dataset.state = isOnline ? "online" : "offline";
        assistantStatusText.textContent = isOnline ? "Online" : "Offline";
        readyText.textContent = isOnline ? "Pronto para imprimir" : "Abra o Print Assistant novamente";
      }

      function setMessage(text = "", status = "info") {
        message.textContent = text;
        message.dataset.state = status;
      }

      function getSelectedPaperSize() {
        return document.querySelector('input[name="paperSize"]:checked')?.value || DEFAULT_PAPER_SIZE;
      }

      function setPaperSize(value) {
        const paperSize = ["58mm", "80mm", "A4"].includes(value) ? value : DEFAULT_PAPER_SIZE;
        const option = document.querySelector(`input[name="paperSize"][value="${paperSize}"]`);

        if (option) {
          option.checked = true;
        }
      }

      function renderPrinters() {
        if (!state.printers.length) {
          printerSelect.innerHTML = '<option value="">Nenhuma impressora encontrada</option>';
          printerSelect.disabled = true;
          testPrintButton.disabled = true;
          return;
        }

        printerSelect.disabled = false;
        testPrintButton.disabled = false;
        printerSelect.innerHTML = state.printers
          .map((printer) => {
            const name = escapeHtml(printer.name);
            const label = escapeHtml(printer.displayName || printer.name);
            return `<option value="${name}">${label}</option>`;
          })
          .join("");

        const preferredPrinter = state.settings.preferredPrinter;
        const defaultPrinter = state.printers.find((printer) => printer.isDefault);
        const selectedPrinter = state.printers.find((printer) => printer.name === preferredPrinter)
          || (state.printers.length === 1 ? state.printers[0] : defaultPrinter)
          || state.printers[0];

        printerSelect.value = selectedPrinter.name;
        saveSettings({ preferredPrinter: selectedPrinter.name });
      }

      async function refreshPrinters() {
        refreshPrintersButton.disabled = true;
        setMessage("Atualizando impressoras...");

        try {
          const status = await window.printAgent.getLocalBridgeStatus();
          state.printers = Array.isArray(status.printers) ? status.printers : [];
          state.settings = {
            ...state.settings,
            ...(status.settings || {}),
          };
          setPaperSize(state.settings.paperSize);
          renderPrinters();
          setOnline(true);
          renderLastPrint(status.diagnostics?.lastPrintDiagnostic);
          setMessage(state.printers.length ? "" : "Instale uma impressora no Windows para continuar.", state.printers.length ? "info" : "error");
          updateInstallButton(status.diagnostics?.update);
        } catch {
          state.printers = [];
          renderPrinters();
          setOnline(false);
          setMessage("Print Assistant offline.", "error");
        } finally {
          refreshPrintersButton.disabled = false;
        }
      }

      async function saveSettings(nextSettings) {
        state.settings = {
          ...state.settings,
          ...nextSettings,
        };

        try {
          await window.printAgent.updateLocalSettings({
            preferredPrinter: state.settings.preferredPrinter,
            paperSize: state.settings.paperSize,
          });
        } catch {
          setMessage("Nao foi possivel salvar a preferencia.", "error");
        }
      }

      async function printTest() {
        if (!printerSelect.value) {
          setMessage("Escolha uma impressora.", "error");
          return;
        }

        testPrintButton.disabled = true;
        setMessage("Enviando teste...");

        try {
          await window.printAgent.printLocal({
            printer: printerSelect.value,
            paperSize: getSelectedPaperSize(),
            text: "Teste de impressao\nPrint Assistant",
          });
          lastResultText.textContent = "Teste enviado. Verifique se saiu na impressora.";
          setMessage("Teste enviado para a impressora.", "success");
        } catch {
          await refreshLastPrintLog();
          setMessage("Nao foi possivel imprimir o teste.", "error");
        } finally {
          testPrintButton.disabled = false;
        }
      }

      async function runQuickDiagnostic() {
        if (!printerSelect.value) {
          setMessage("Escolha uma impressora.", "error");
          return;
        }

        diagnosticButton.disabled = true;
        setMessage("Executando diagnostico...");

        try {
          const result = await window.printAgent.printRawTest({
            printer: printerSelect.value,
          });
          renderLastPrint(result.trace);
          setMessage("Diagnostico enviado para a impressora.", "success");
        } catch {
          await refreshLastPrintLog();
          setMessage("Diagnostico encontrou uma falha.", "error");
        } finally {
          diagnosticButton.disabled = false;
        }
      }

      async function refreshLastPrintLog() {
        try {
          const log = await window.printAgent.getLastPrintLog();
          renderLastPrint(log?.lastJob);
        } catch {
          lastResultText.textContent = "Nao foi possivel ler o ultimo diagnostico.";
        }
      }

      function renderLastPrint(trace) {
        if (!trace) {
          lastResultText.textContent = "Nenhum teste executado.";
          return;
        }

        if (trace.status === "success") {
          lastResultText.textContent = "Concluida.";
          return;
        }

        if (trace.status === "failure") {
          const reason = trace.error?.message || trace.callback?.failureReason || "Falha na impressao.";
          lastResultText.textContent = `Ultimo erro: ${reason}`;
          return;
        }

        lastResultText.textContent = "Teste aceito.";
      }

      async function checkForUpdates() {
        checkUpdateButton.disabled = true;
        setMessage("Verificando atualizacao...");

        try {
          const result = await window.printAgent.checkForUpdates();

          if (result?.downloaded || result?.available) {
            updateInstallButton(result);
            setMessage("Nova versao disponivel.", "success");
            return;
          }

          setMessage("Voce ja esta na versao mais recente.", "success");
        } catch {
          setMessage("Nao foi possivel verificar agora.", "error");
        } finally {
          checkUpdateButton.disabled = false;
        }
      }

      function updateInstallButton(update) {
        const canInstall = Boolean(update?.downloaded);
        installUpdateButton.classList.toggle("hidden", !canInstall);
      }

      async function installUpdate() {
        setMessage("Atualizando...");

        try {
          await window.printAgent.installUpdate();
        } catch {
          setMessage("Atualizacao indisponivel agora.", "error");
        }
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      printerSelect.addEventListener("change", () => {
        saveSettings({ preferredPrinter: printerSelect.value });
      });

      document.querySelectorAll('input[name="paperSize"]').forEach((input) => {
        input.addEventListener("change", () => {
          saveSettings({ paperSize: getSelectedPaperSize() });
        });
      });

      refreshPrintersButton.addEventListener("click", refreshPrinters);
      testPrintButton.addEventListener("click", printTest);
      diagnosticButton.addEventListener("click", runQuickDiagnostic);
      checkUpdateButton.addEventListener("click", checkForUpdates);
      installUpdateButton.addEventListener("click", installUpdate);

      refreshPrinters();
    </script>
  </body>
</html>
