<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print Assistant</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", ui-sans-serif, system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(20, 117, 99, 0.2), transparent 32%),
          linear-gradient(145deg, #f7fbf9 0%, #edf4f1 100%);
        color: #14211d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        display: grid;
        place-items: center;
      }

      main {
        width: min(100%, 460px);
      }

      .app {
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(20, 33, 29, 0.08);
        box-shadow: 0 24px 64px rgba(24, 48, 39, 0.12);
      }

      .header {
        display: grid;
        gap: 14px;
        margin-bottom: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: #12372c;
        color: #fff;
        font-size: 24px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      .subtitle {
        margin: 0;
        color: #5f6f68;
        font-size: 14px;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 16px;
        border-radius: 18px;
        background: #eff8f4;
        color: #0f8b64;
      }

      .status[data-state="offline"] {
        background: #fff3f1;
        color: #c2412d;
      }

      .status-main {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: currentColor;
        box-shadow: 0 0 0 5px rgba(15, 139, 100, 0.13);
      }

      .status[data-state="offline"] .status-dot {
        box-shadow: 0 0 0 5px rgba(194, 65, 45, 0.12);
      }

      .status-title {
        font-size: 15px;
        font-weight: 800;
      }

      .status-copy {
        margin: 2px 0 0;
        font-size: 13px;
        color: #60736b;
      }

      .status[data-state="offline"] .status-copy {
        color: #93645c;
      }

      .version {
        font-size: 12px;
        font-weight: 700;
        color: #60736b;
      }

      .card {
        margin-top: 18px;
        padding: 18px;
        border-radius: 18px;
        background: #f8fbf9;
        border: 1px solid rgba(18, 55, 44, 0.08);
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #6c7c75;
      }

      .printer-list {
        display: grid;
        gap: 10px;
      }

      .printer-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: #fff;
        border: 1px solid rgba(18, 55, 44, 0.08);
      }

      .printer-name {
        font-size: 14px;
        font-weight: 700;
      }

      .printer-meta {
        color: #6a7771;
        font-size: 12px;
      }

      .empty {
        margin: 0;
        color: #6a7771;
        font-size: 14px;
      }

      .actions {
        margin-top: 20px;
        display: grid;
        gap: 10px;
      }

      button {
        min-height: 48px;
        border: 0;
        border-radius: 14px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
        transform: none;
      }

      .primary {
        background: #12372c;
        color: #fff;
        box-shadow: 0 10px 24px rgba(18, 55, 44, 0.18);
      }

      .secondary {
        background: #ebf3ef;
        color: #21443a;
      }

      .quiet {
        background: transparent;
        color: #6b7872;
      }

      .message {
        min-height: 20px;
        margin: 16px 0 0;
        text-align: center;
        color: #60736b;
        font-size: 14px;
      }

      .message[data-state="success"] {
        color: #0f8b64;
      }

      .message[data-state="error"] {
        color: #c2412d;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="app">
        <div class="header">
          <div class="brand">
            <div class="logo">P</div>
            <div>
              <h1>Print Assistant</h1>
              <p class="subtitle">Local-first, automatico e pronto para imprimir.</p>
            </div>
          </div>

          <div class="status" id="statusCard" data-state="offline">
            <div class="status-main">
              <span class="status-dot" aria-hidden="true"></span>
              <div>
                <div class="status-title" id="statusTitle">Offline</div>
                <p class="status-copy" id="statusCopy">Aguardando conexao local.</p>
              </div>
            </div>
            <span class="version" id="versionLabel">v-</span>
          </div>
        </div>

        <section class="card">
          <h2>Impressoras detectadas</h2>
          <div class="printer-list" id="printerList"></div>
          <p class="empty" id="emptyState">Procurando impressoras...</p>
        </section>

        <div class="actions">
          <button class="primary" id="testButton" type="button">Teste rapido</button>
          <button class="secondary" id="updateButton" type="button">Verificar atualizacao</button>
          <button class="secondary" id="installButton" type="button" hidden>Instalar atualizacao</button>
          <button class="quiet" id="quitButton" type="button">Sair</button>
        </div>

        <p class="message" id="message" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script>
      const statusCard = document.getElementById("statusCard");
      const statusTitle = document.getElementById("statusTitle");
      const statusCopy = document.getElementById("statusCopy");
      const versionLabel = document.getElementById("versionLabel");
      const printerList = document.getElementById("printerList");
      const emptyState = document.getElementById("emptyState");
      const testButton = document.getElementById("testButton");
      const updateButton = document.getElementById("updateButton");
      const installButton = document.getElementById("installButton");
      const quitButton = document.getElementById("quitButton");
      const message = document.getElementById("message");

      let refreshTimer = null;
      let latestStatus = null;

      function setMessage(text = "", state = "info") {
        message.textContent = text;
        message.dataset.state = state;
      }

      function setOnline(isOnline) {
        statusCard.dataset.state = isOnline ? "online" : "offline";
        statusTitle.textContent = isOnline ? "Online" : "Offline";
        statusCopy.textContent = isOnline
          ? "O app esta pronto para receber pedidos locais."
          : "Abra o Print Assistant para voltar a imprimir.";
      }

      function renderPrinters(printers = []) {
        printerList.innerHTML = "";

        if (!printers.length) {
          emptyState.hidden = false;
          emptyState.textContent = "Nenhuma impressora encontrada no Windows.";
          testButton.disabled = true;
          return;
        }

        emptyState.hidden = true;
        testButton.disabled = false;

        for (const printer of printers) {
          const item = document.createElement("div");
          item.className = "printer-item";

          const info = document.createElement("div");
          const name = document.createElement("div");
          const meta = document.createElement("div");
          name.className = "printer-name";
          meta.className = "printer-meta";
          name.textContent = printer.displayName || printer.name;
          meta.textContent = printer.isDefault ? "Padrao do Windows" : "Disponivel";
          info.append(name, meta);

          const paper = document.createElement("div");
          paper.className = "printer-meta";
          paper.textContent = suggestPaperSize(printer.name);

          item.append(info, paper);
          printerList.append(item);
        }
      }

      function suggestPaperSize(printerName = "") {
        const value = String(printerName).toLowerCase();

        if (value.includes("58")) return "58mm";
        if (value.includes("80")) return "80mm";
        return "A4/local";
      }

      function updateInstallButton(update) {
        installButton.hidden = !Boolean(update && update.downloaded);
      }

      async function refreshStatus(showErrors = false) {
        try {
          const status = await window.printAssistant.getStatus();
          latestStatus = status;
          setOnline(Boolean(status.online));
          versionLabel.textContent = `v${status.version || "-"}`;
          renderPrinters(Array.isArray(status.printers) ? status.printers : []);
          updateInstallButton(status.diagnostics && status.diagnostics.update);

          if (!status.printers || !status.printers.length) {
            setMessage("Instale ao menos uma impressora no Windows.", "error");
          } else if (showErrors) {
            setMessage("", "info");
          }
        } catch (error) {
          latestStatus = null;
          setOnline(false);
          renderPrinters([]);
          updateInstallButton(null);

          if (showErrors) {
            setMessage("Nao foi possivel acessar o localhost do Print Assistant.", "error");
          }
        }
      }

      async function runTest() {
        testButton.disabled = true;
        setMessage("Enviando teste para a impressora...", "info");

        try {
          await window.printAssistant.printTest({});
          setMessage("Teste enviado com sucesso.", "success");
          await refreshStatus(false);
        } catch {
          setMessage("O teste falhou. Verifique a impressora e tente novamente.", "error");
        } finally {
          testButton.disabled = false;
        }
      }

      async function checkUpdates() {
        updateButton.disabled = true;
        setMessage("Verificando atualizacao...", "info");

        try {
          const result = await window.printAssistant.checkForUpdates();
          updateInstallButton(result);
          setMessage(
            result && (result.downloaded || result.available)
              ? "Nova versao encontrada."
              : "Voce ja esta na versao mais recente.",
            "success",
          );
        } catch {
          setMessage("Nao foi possivel verificar atualizacoes agora.", "error");
        } finally {
          updateButton.disabled = false;
        }
      }

      async function installUpdate() {
        installButton.disabled = true;
        setMessage("Preparando atualizacao...", "info");

        try {
          await window.printAssistant.installUpdate();
        } catch {
          setMessage("A instalacao da atualizacao nao esta disponivel agora.", "error");
          installButton.disabled = false;
        }
      }

      async function quitApp() {
        quitButton.disabled = true;
        setMessage("Encerrando o Print Assistant...", "info");

        try {
          await window.printAssistant.quit();
        } catch {
          setMessage("Nao foi possivel encerrar agora.", "error");
          quitButton.disabled = false;
        }
      }

      testButton.addEventListener("click", runTest);
      updateButton.addEventListener("click", checkUpdates);
      installButton.addEventListener("click", installUpdate);
      quitButton.addEventListener("click", quitApp);

      refreshStatus(true);
      refreshTimer = setInterval(() => {
        refreshStatus(false);
      }, 5000);

      window.addEventListener("beforeunload", () => {
        if (refreshTimer) {
          clearInterval(refreshTimer);
        }
      });
    </script>
  </body>
</html>
